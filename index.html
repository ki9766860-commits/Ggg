<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>رمضان 2027 | العد التنازلي</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a2f2a 0%, #064e3b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* زخارف متحركة */
        body::before {
            content: "🌙";
            position: fixed;
            font-size: 180px;
            bottom: -30px;
            left: -40px;
            opacity: 0.08;
            pointer-events: none;
            animation: float 15s infinite ease-in-out;
        }

        body::after {
            content: "⭐";
            position: fixed;
            font-size: 150px;
            top: -30px;
            right: -30px;
            opacity: 0.08;
            pointer-events: none;
            animation: float 18s infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(15px, -15px) rotate(10deg); }
        }

        /* نجوم متطايرة */
        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .star {
            position: absolute;
            color: rgba(255, 255, 255, 0.5);
            font-size: 6px;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.5); }
        }

        /* فوانيس متحركة */
        .lantern {
            position: fixed;
            top: 15px;
            right: 15px;
            font-size: 40px;
            animation: swing 3s infinite ease-in-out;
            z-index: 1;
            filter: drop-shadow(0 0 5px gold);
        }

        .lantern-left {
            left: 15px;
            right: auto;
        }

        @keyframes swing {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        .card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 50px;
            max-width: 650px;
            width: 100%;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            position: relative;
            z-index: 2;
            backdrop-filter: blur(2px);
        }

        h1 {
            color: #065f46;
            font-size: 2rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sub {
            color: #4b5563;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* جدول العد التنازلي */
        .countdown-table {
            background: #0a2f27;
            border-radius: 40px;
            padding: 20px;
            margin: 20px 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            direction: rtl;
        }

        th, td {
            padding: 15px 8px;
            text-align: center;
            color: #facc15;
            font-weight: bold;
        }

        th {
            font-size: 1rem;
            color: #ffd966;
            border-bottom: 2px solid #ffd96650;
        }

        td {
            font-size: 1.8rem;
            font-family: monospace;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .date-badge {
            margin-top: 18px;
            background: #fef3c7;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            color: #b45309;
            font-weight: 500;
        }

        /* زر التحكم بالنجوم */
        .control-btn {
            background: #2d6a4f;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            margin: 10px 0;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: #1f4d3a;
            transform: scale(1.02);
        }

        /* رسالة المطور */
        .dev-message {
            background: #eef3f0;
            padding: 15px;
            border-radius: 30px;
            margin-top: 25px;
            font-size: 0.8rem;
            text-align: right;
            border-right: 4px solid #10b981;
        }

        .dev-message strong {
            color: #065f46;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
            padding-top: 15px;
        }

        @media (max-width: 550px) {
            td { font-size: 1.2rem; padding: 10px 5px; }
            th { font-size: 0.7rem; }
            .card { padding: 25px 15px; }
            .lantern { font-size: 25px; }
        }
    </style>
</head>
<body>

<div class="stars" id="starsContainer"></div>
<div class="lantern">🏮</div>
<div class="lantern lantern-left">🏮</div>

<div class="card">
    <h1>
        <span>🌙</span>
        رمضان 2027
        <span>⭐</span>
    </h1>
    <div class="sub">العد التنازلي لقدوم الشهر المبارك</div>

    <!-- جدول العد التنازلي -->
    <div class="countdown-table">
        <table>
            <thead>
                <tr>
                    <th>أشهر</th>
                    <th>أيام</th>
                    <th>ساعات</th>
                    <th>دقائق</th>
                    <th>ثواني</th>
                  </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="months">0</td>
                    <td id="days">0</td>
                    <td id="hours">0</td>
                    <td id="minutes">0</td>
                    <td id="seconds">0</td>
                  </tr>
            </tbody>
        </table>
        <div class="date-badge" id="dateBadge"></div>
    </div>

    <!-- زر التحكم بالنجوم -->
    <button class="control-btn" id="toggleStarsBtn">✨ إخفاء / إظهار النجوم</button>

    <!-- ================================================== -->
    <!-- رسالة المطور -->
    <!-- ================================================== -->
    <div class="dev-message">
        <strong>👨‍💻 رسالة المطور:</strong><br>
        كل ناس تبي تصوم وتختم وانا ابي مسلسل ينزل في رمضان جاي
    </div>

    <div class="footer">
        © 1448 هـ - 2027 | جميع الحقوق محفوظة
    </div>
</div>

<script>
    // تاريخ رمضان 8 فبراير 2027
    const targetDate = new Date(2027, 1, 8);
    const badgeElement = document.getElementById("dateBadge");

    // عناصر الجدول
    const monthsSpan = document.getElementById("months");
    const daysSpan = document.getElementById("days");
    const hoursSpan = document.getElementById("hours");
    const minutesSpan = document.getElementById("minutes");
    const secondsSpan = document.getElementById("seconds");

    // عرض التاريخ
    const formattedDate = targetDate.toLocaleDateString('ar-EG', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
    });
    badgeElement.innerHTML = `📅 أول رمضان: ${formattedDate}`;

    // تحديث الجدول
    function updateCountdownTable() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) {
            monthsSpan.innerHTML = "0";
            daysSpan.innerHTML = "0";
            hoursSpan.innerHTML = "0";
            minutesSpan.innerHTML = "0";
            secondsSpan.innerHTML = "0";
            return;
        }

        const totalSeconds = Math.floor(diff / 1000);
        const months = Math.floor(totalSeconds / (30 * 24 * 60 * 60));
        const days = Math.floor((totalSeconds % (30 * 24 * 60 * 60)) / (24 * 60 * 60));
        const hours = Math.floor((totalSeconds % (24 * 60 * 60)) / (60 * 60));
        const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
        const seconds = totalSeconds % 60;

        monthsSpan.innerHTML = months;
        daysSpan.innerHTML = days;
        hoursSpan.innerHTML = hours;
        minutesSpan.innerHTML = minutes;
        secondsSpan.innerHTML = seconds;
    }

    // تحديث كل ثانية
    updateCountdownTable();
    setInterval(updateCountdownTable, 1000);

    // نجوم متحركة
    function generateStars() {
        const starsDiv = document.getElementById("starsContainer");
        for (let i = 0; i < 100; i++) {
            let star = document.createElement("div");
            star.className = "star";
            star.style.left = Math.random() * 100 + "%";
            star.style.top = Math.random() * 100 + "%";
            star.style.animationDelay = Math.random() * 5 + "s";
            star.innerHTML = "✦";
            starsDiv.appendChild(star);
        }
    }
    generateStars();

    // إخفاء / إظهار النجوم
    let starsVisible = true;
    document.getElementById("toggleStarsBtn").addEventListener("click", () => {
        const starsContainer = document.getElementById("starsContainer");
        starsVisible = !starsVisible;
        starsContainer.style.display = starsVisible ? "block" : "none";
    });
</script>
</body>
</html>
